evals:
  - id: lens.eval.top_down_routes_to_discovery
    input: Large ambiguous school improvement platform idea.
    expected:
      - route_to: bmad-lens-discover
      - not_route_directly_to: bmad-create-prd
      - requires_context_check: true
  - id: lens.eval.top_down_discovery_handoff_actions
    input: A top-down discovery pass has created capture, extraction, journey, slice, impact, context, graph, and Auspex outputs.
    expected:
      - produces: discovery-next-steps.md
      - includes: [current_gate, review_order, candidate_slice_overview, selected_first_slice, action_queue]
      - explains_slice_as: thin_work_option_when_helpful
      - blocks_bmad_until: context_gate_ready_or_explicitly_accepted
  - id: lens.eval.bottom_up_remains_slice
    input: I want to download images from 3D printing model websites.
    expected:
      - creates: slice.download_model_images
      - does_not_create_by_default: [system, domain, service, capability, platform]
      - slice_contract: inline_acceptance_evidence_and_risks_in_slice_yaml
  - id: lens.eval.relationship_contract_validation
    input: Relationship fixture has an unknown type, non-lifecycle status, or missing gate.
    expected:
      - validator: validate_lens_assets.py
      - detects: [unknown_relationship_type, non_lifecycle_relationship_status, missing_relationship_gate]
      - canonical_source: skills/bmad-lens-setup/assets/lens/schemas/relationship-types.yaml
  - id: lens.eval.repeated_pressure_promotion_candidate
    input: Multiple slices reuse artifact.model_image_set and image metadata workflow.
    expected:
      - creates: promotion_candidate
      - automatic: false
      - human_review_required: true
  - id: lens.eval.focused_bmad_packet
    input: Focused top-down slice evidence_visible_to_teacher.
    expected:
      - includes: [active_slice, included_scope, explicit_exclusions, required_capabilities, decisions, risks, acceptance_evidence]
      - excludes: [adjacent_future_slices, speculative_platform_architecture]
      - emits: [bmad-packet.md, bmad-packet.yaml]
  - id: lens.eval.context_gate_blocks_prd
    input: Discovery has weak journey readiness and unresolved evidence definitions.
    expected:
      - route_to: bmad-lens-context-check
      - blocks: bmad-create-prd
      - writes: [_bmad-output/lens/gates/context-sufficiency-1.md, _bmad-output/lens/gates/context-score.yaml]
  - id: lens.eval.workstream_impact_projection
    input: Slice impact map has impacted workstreams, conflicting workstreams, shared files, and shared contracts.
    expected:
      - relationships: [impacted_by, possibly_conflicts_with, touches_file, touches_contract]
      - traceability: [impacted_workstreams, shared_files, shared_contracts]
      - warning: workstream_impact_gate
  - id: lens.eval.guard_story_traceability
    input: One story traces to active slice and one expands scope without trace.
    expected:
      - traceable_story: pass
      - untraceable_story: fail
      - scope_expanding_story: fail
  - id: lens.eval.salmon_upstream_impact
    input: Implementation reveals teacher access cannot be determined from roster alone.
    expected:
      - creates: salmon_signal
      - severity: high
      - suggests_bmad_correct_course: true
  - id: lens.eval.doctor_invalid_topology
    input: Derived map has duplicate IDs, orphaned relationship, missing source refs, stale records, and an unsynced BMAD packet.
    expected:
      - detects: [duplicate_id, orphan_ref, missing_source_refs, stale_or_needs_review, bmad_sync_gap]
      - writes: [_bmad-output/lens/graph/warnings.yaml, _bmad-output/lens/graph/doctor-report.md]
  - id: lens.eval.auspex_read_only_status
    input: Derived Map exists with active slices, risks, and Salmon signals.
    expected:
      - reads_from: _bmad-output/lens/graph/derived-map.json
      - writes: [_bmad-output/lens/auspex/status.yaml, _bmad-output/lens/auspex/status.json, _bmad-output/lens/auspex/stakeholder-summary.md]
      - mutates_source_truth: false
  - id: lens.eval.project_context_init
    input: Run lens init in a project without _bmad-output/project-context.md.
    expected:
      - writes: _bmad-output/project-context.md
      - includes: [Traceability Rule, Scope Rule, Architecture Rule, Upstream Change Rule, Source Truth Rule]
